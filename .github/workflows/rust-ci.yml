name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 格式 + 版本一致性 + 文档链接（平台无关，单次运行）───────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri/WebKit/GTK)
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_DEV_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_DEV_PKG=libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            pkg-config patchelf libglib2.0-dev libgirepository1.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            "$WEBKIT_DEV_PKG"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check version consistency
        run: |
          WORKSPACE_VERSION=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path('Cargo.toml').read_text(encoding='utf-8')
          match = re.search(r'(?ms)^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit('Failed to read workspace version from Cargo.toml')
          print(match.group(1))
          PY
          )
          UI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('ui/package.json').read_text(encoding='utf-8'))['version'])
          PY
          )
          TAURI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('memori-desktop/tauri.conf.json').read_text(encoding='utf-8'))['version'])
          PY
          )

          echo "workspace version: $WORKSPACE_VERSION"
          echo "ui version:        $UI_VERSION"
          echo "tauri version:     $TAURI_VERSION"

          if [ "$WORKSPACE_VERSION" != "$UI_VERSION" ] || [ "$WORKSPACE_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch detected among Cargo workspace, ui/package.json, and memori-desktop/tauri.conf.json"
            exit 1
          fi

          RELEASE_NOTES_PATH="docs/release/RELEASE_NOTES_v${WORKSPACE_VERSION}.md"
          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Missing release notes file for current version: $RELEASE_NOTES_PATH"
            exit 1
          fi

      - name: Check release documentation links
        shell: bash
        run: |
          test -f docs/architecture/MEMORY_OS_LITE.md
          grep -q "MEMORY_OS_LITE.md" README.md
          grep -q "MEMORY_OS_LITE.md" README.en.md
          grep -q "Memory OS Lite" docs/release/RELEASE_NOTES_v$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path('Cargo.toml').read_text(encoding='utf-8')
          print(re.search(r'(?ms)^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"', text).group(1))
          PY
          ).md

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── 编译 + Clippy + 单元测试（跨平台矩阵，捕获平台特定编译错误）──────────
  clippy-test:
    name: clippy-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri/WebKit/GTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_DEV_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_DEV_PKG=libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            pkg-config patchelf libglib2.0-dev libgirepository1.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            "$WEBKIT_DEV_PKG"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Lint (warnings as errors)
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  # ── UI 构建（平台无关，单次运行）───────────────────────────────────────
  ui-build:
    name: ui-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build UI
        run: pnpm --dir ui run build

  # ── 依赖漏洞扫描（单次运行）────────────────────────────────────────────
  security:
    name: dependency-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit Rust dependencies (advisories + bans + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Audit npm dependencies (high severity and above)
        run: pnpm --dir ui audit --audit-level high
