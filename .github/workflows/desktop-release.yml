name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release instead of keeping it as draft"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: windows
          - name: Linux
            os: ubuntu-22.04
            artifact: linux
          - name: macOS
            os: macos-latest
            artifact: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install Linux system dependencies (Tauri/WebKit/GTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_DEV_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_DEV_PKG=libwebkit2gtk-4.0-dev
          fi

          sudo apt-get install -y \
            pkg-config \
            patchelf \
            libglib2.0-dev \
            libgirepository1.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            "$WEBKIT_DEV_PKG"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Validate version metadata
        shell: bash
        run: |
          WORKSPACE_VERSION=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path('Cargo.toml').read_text(encoding='utf-8')
          match = re.search(r'(?ms)^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit('Failed to read workspace version from Cargo.toml')
          print(match.group(1))
          PY
          )
          UI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('ui/package.json').read_text(encoding='utf-8'))['version'])
          PY
          )
          TAURI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('memori-desktop/tauri.conf.json').read_text(encoding='utf-8'))['version'])
          PY
          )
          RELEASE_NOTES_PATH="docs/RELEASE_NOTES_v${WORKSPACE_VERSION}.md"

          if [ "$WORKSPACE_VERSION" != "$UI_VERSION" ] || [ "$WORKSPACE_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch detected among Cargo workspace, ui/package.json, and memori-desktop/tauri.conf.json"
            exit 1
          fi

          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_PATH"
            exit 1
          fi

      - name: Build frontend
        run: pnpm --dir ui run build

      - name: Build desktop bundle
        working-directory: memori-desktop
        run: cargo tauri build --ci

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            target/release/bundle/**/*
            memori-desktop/target/release/bundle/**/*

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version and tag
        id: release_meta
        shell: bash
        run: |
          VERSION="$(python -c "import json;print(json.load(open('memori-desktop/tauri.conf.json', encoding='utf-8'))['version'])")"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        run: |
          WORKSPACE_VERSION=$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path('Cargo.toml').read_text(encoding='utf-8')
          match = re.search(r'(?ms)^\[workspace\.package\]\s+.*?^version\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit('Failed to read workspace version from Cargo.toml')
          print(match.group(1))
          PY
          )
          UI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('ui/package.json').read_text(encoding='utf-8'))['version'])
          PY
          )
          TAURI_VERSION=$(python - <<'PY'
          import json, pathlib
          print(json.loads(pathlib.Path('memori-desktop/tauri.conf.json').read_text(encoding='utf-8'))['version'])
          PY
          )
          EXPECTED_VERSION="${{ steps.release_meta.outputs.version }}"
          EXPECTED_TAG="v${EXPECTED_VERSION}"
          RELEASE_NOTES_PATH="docs/RELEASE_NOTES_v${EXPECTED_VERSION}.md"

          echo "workspace version: $WORKSPACE_VERSION"
          echo "ui version: $UI_VERSION"
          echo "tauri version: $TAURI_VERSION"
          echo "release version: $EXPECTED_VERSION"
          echo "release tag: ${{ steps.release_meta.outputs.tag }}"

          if [ "$WORKSPACE_VERSION" != "$UI_VERSION" ] || [ "$WORKSPACE_VERSION" != "$TAURI_VERSION" ] || [ "$WORKSPACE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch detected among Cargo workspace, ui/package.json, memori-desktop/tauri.conf.json, and resolved release version"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.release_meta.outputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch: expected $EXPECTED_TAG but got ${{ steps.release_meta.outputs.tag }}"
            exit 1
          fi

          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_PATH"
            exit 1
          fi

          grep -q "Memory OS Lite" "$RELEASE_NOTES_PATH"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish draft release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Memori-Vault ${{ steps.release_meta.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true' }}
          target_commitish: ${{ github.sha }}
          body_path: docs/RELEASE_NOTES_v${{ steps.release_meta.outputs.version }}.md
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*-setup.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.sig
