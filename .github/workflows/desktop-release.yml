name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: windows
          - name: Linux
            os: ubuntu-22.04
            artifact: linux
          - name: macOS
            os: macos-latest
            artifact: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Linux system dependencies (Tauri/WebKit/GTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_DEV_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_DEV_PKG=libwebkit2gtk-4.0-dev
          fi

          sudo apt-get install -y \
            pkg-config \
            patchelf \
            libglib2.0-dev \
            libgirepository1.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            "$WEBKIT_DEV_PKG"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Build frontend
        run: npm --prefix ui run build

      - name: Build desktop bundle
        working-directory: memori-desktop
        run: cargo tauri build --ci

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            target/release/bundle/**/*
            memori-desktop/target/release/bundle/**/*

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version and tag
        id: release_meta
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
import json
with open('memori-desktop/tauri.conf.json', 'r', encoding='utf-8') as f:
    print(json.load(f)['version'])
PY
          )"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish draft release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Memori-Vault ${{ steps.release_meta.outputs.version }}
          draft: true
          target_commitish: ${{ github.sha }}
          body: |
            ## Memori-Vault ${{ steps.release_meta.outputs.version }}

            This is an auto-generated draft release.

            ### Build Matrix
            - Windows installer/bundle
            - Linux installer/bundle
            - macOS installer/bundle

            ### Notes
            - Version is read from `memori-desktop/tauri.conf.json`.
            - Assets are attached from GitHub Actions build artifacts.
          files: release-artifacts/**/*
          generate_release_notes: true
